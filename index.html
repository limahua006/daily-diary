<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>每日记录</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#007AFF">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="每日记录">
  <link rel="apple-touch-icon" href="icons/icon-120.png">
  <link rel="apple-touch-icon" sizes="120x120" href="icons/icon-120.png">
  <link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180.png">
  <link rel="apple-touch-startup-image" href="icons/icon-1024.png">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

    :root {
      --bg: #F2F2F7;
      --card: #FFFFFF;
      --text-primary: #1C1C1E;
      --text-secondary: #8E8E93;
      --text-done: #BDBDC2;
      --accent: #007AFF;
      --accent-fill: #34C759;
      --border: #E5E5EA;
      --shadow: 0 2px 16px rgba(0,0,0,0.06);
      --radius: 14px;
      --sidebar-w: 300px;
    }



    /* Left sidebar - News panel */
    .left-sidebar {
      position: fixed;
      left: 0;
      top: 0;
      bottom: 0;
      width: var(--left-sidebar-w, 280px);
      background: var(--card);
      border-right: 0.5px solid var(--border);
      z-index: 100;
      display: flex;
      flex-direction: column;
      transform: translateX(0);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), width 0.3s;
      box-shadow: 2px 0 12px rgba(0,0,0,0.04);
    }

    .left-sidebar.collapsed {
      transform: translateX(-100%);
    }

    .left-sidebar-toggle {
      position: fixed;
      left: 8px;
      top: 50%;
      transform: translateY(-50%);
      width: 28px;
      height: 56px;
      background: var(--card);
      border: 0.5px solid var(--border);
      border-radius: 0 8px 8px 0;
      cursor: pointer;
      z-index: 101;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 2px 0 8px rgba(0,0,0,0.06);
      transition: left 0.3s;
    }

    .left-sidebar:not(.collapsed) ~ .left-sidebar-toggle {
      left: calc(var(--left-sidebar-w, 280px) - 14px);
    }

    .left-sidebar-toggle svg {
      width: 14px;
      height: 14px;
      color: var(--text-secondary);
      transition: transform 0.3s;
    }

    .left-sidebar.collapsed ~ .left-sidebar-toggle svg {
      transform: rotate(180deg);
    }

    .left-sidebar-header {
      padding: 16px 14px;
      border-bottom: 0.5px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .left-sidebar-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .left-sidebar-refresh {
      font-size: 12px;
      color: var(--accent);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .left-sidebar-refresh:hover { background: var(--accent-light); }
    .left-sidebar-refresh.spinning svg { animation: spin 1s linear infinite; }
    .left-sidebar-refresh svg { width: 12px; height: 12px; }

    .left-sidebar-content {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
    }

    

    .main {
      /* No margin-left - stay centered */
    }

    /* Task edit input */
    
    /* News cards */
    .news-loading {
      font-size: 13px;
      color: var(--text-secondary);
      padding: 20px;
      text-align: center;
    }

    .news-card {
      display: block;
      text-decoration: none;
      color: inherit;
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 10px;
      transition: background 0.15s, transform 0.15s, box-shadow 0.15s;
      cursor: pointer;
    }

    .news-card:last-child { margin-bottom: 0; }

    .news-card:hover {
      background: var(--accent-light);
      transform: translateY(-1px);
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    .news-card-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 6px;
    }

    .news-card-tag {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 8px;
      letter-spacing: 0.3px;
    }

    .news-card-tag.econ { background: #E8F8EC; color: #2e7d32; }
    .news-card-tag.politics { background: #FFF3E0; color: #e65100; }

    .news-card-source {
      font-size: 10px;
      color: var(--text-secondary);
    }

    .news-card-time {
      font-size: 10px;
      color: var(--text-secondary);
      margin-left: auto;
    }

    .news-card-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.4;
      margin-bottom: 4px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .news-card-summary {
      font-size: 11px;
      color: var(--text-secondary);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .news-card-arrow {
      font-size: 10px;
      color: var(--accent);
      margin-top: 4px;
      font-weight: 500;
    }

.task-text-edit {
      font-size: 16px;
      line-height: 1.5;
      color: var(--text-primary);
      background: var(--bg);
      border: 1px solid var(--accent);
      border-radius: 6px;
      padding: 4px 8px;
      width: 100%;
      outline: none;
      font-family: inherit;
    }


    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'SF Pro Display', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* Layout */
    .layout {
      display: flex;
      min-height: 100vh;
    }

    /* Main content */
    .main {
      flex: 1;
      max-width: 640px;
      margin: 0 auto;
      padding: 40px 16px 120px;
    }

    /* Header */
    .header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 20px;
      padding: 0 4px;
    }

    .header h1 {
      font-size: 34px;
      font-weight: 600;
      letter-spacing: -0.5px;
    }

    .header-actions {
      display: flex;
      gap: 8px;
    }

    /* Search box */
    .search-box {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--card);
      border: 0.5px solid var(--border);
      border-radius: 10px;
      padding: 8px 14px;
      margin-bottom: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
      transition: border-color 0.2s;
    }

    .search-box:focus-within {
      border-color: var(--accent);
    }

    .search-box svg {
      width: 16px;
      height: 16px;
      color: var(--text-secondary);
      flex-shrink: 0;
    }

    .search-box input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 15px;
      font-family: inherit;
      color: var(--text-primary);
      background: transparent;
    }

    .search-box input::placeholder { color: #C7C7CC; }

    .search-clear {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #C7C7CC;
      border: none;
      color: white;
      font-size: 11px;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .search-box.has-text .search-clear { display: flex; }

    .search-result-count {
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 12px;
      padding: 0 4px;
      display: none;
    }

    /* Share button */
    .share-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--card);
      border: 0.5px solid var(--border);
      border-radius: 9px;
      padding: 7px 14px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
      white-space: nowrap;
    }

    .share-btn:hover { background: var(--accent-light); border-color: var(--accent); color: var(--accent); }
    .share-btn.copied { background: #E8F8EC; border-color: var(--accent-fill); color: var(--accent-fill); }

    /* Sidebar toggle */
    .sidebar-toggle {
      width: 36px;
      height: 36px;
      border-radius: 9px;
      border: 0.5px solid var(--border);
      background: var(--card);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
      transition: all 0.2s;
    }

    .sidebar-toggle:hover { border-color: var(--accent); }
    .sidebar-toggle.active { background: var(--accent); border-color: var(--accent); }
    .sidebar-toggle.active svg { color: white; }
    .sidebar-toggle svg { width: 18px; height: 18px; color: var(--text-secondary); }

    /* Today button */
    .today-btn {
      font-size: 12px;
      font-weight: 600;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 6px;
      padding: 4px 10px;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
    }

    .today-btn:hover { opacity: 0.85; }

    /* Add task row */
    .add-task-row {
      display: flex;
      align-items: center;
      padding: 16px 20px;
      gap: 12px;
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 0.5px solid var(--border);
      margin-bottom: 24px;
      transition: box-shadow 0.15s;
    }

    .add-task-row:focus-within { box-shadow: 0 2px 20px rgba(0,122,255,0.15); }

    .add-icon {
      width: 22px; height: 22px;
      border-radius: 50%;
      border: 2px solid var(--accent);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .add-icon::after { content: '+'; color: var(--accent); font-size: 16px; font-weight: 300; transition: all 0.25s; }

    .add-task-row:focus-within .add-icon { background: var(--accent); transform: scale(1.1); }
    .add-task-row:focus-within .add-icon::after { color: white; transform: rotate(45deg); font-size: 18px; }

    #taskInput {
      flex: 1; border: none; outline: none;
      font-size: 17px; color: var(--text-primary);
      background: transparent; font-family: inherit;
    }
    #taskInput::placeholder { color: #C7C7CC; }

    /* Date section */
    .date-section {
      margin-bottom: 8px;
    }

    .date-sticky {
      position: sticky;
      top: 0;
      background: var(--bg);
      padding: 16px 4px 10px;
      z-index: 10;
    }

    .date-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .date-title {
      font-size: 20px;
      font-weight: 600;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .date-title .today-tag {
      font-size: 10px;
      font-weight: 600;
      background: var(--accent);
      color: white;
      padding: 2px 6px;
      border-radius: 4px;
      letter-spacing: 0.3px;
    }

    .date-progress {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .date-progress-text {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
    }

    .date-progress-bar {
      width: 60px;
      height: 4px;
      background: #E5E5EA;
      border-radius: 2px;
      overflow: hidden;
    }

    .date-progress-fill {
      height: 100%;
      background: var(--accent-fill);
      border-radius: 2px;
      transition: width 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    /* Task list card */
    .task-list {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      border: 0.5px solid var(--border);
    }

    /* Task item */
    .task-item {
      display: flex;
      align-items: flex-start;
      padding: 15px 20px;
      gap: 14px;
      cursor: pointer;
      transition: background 0.15s;
      border-bottom: 0.5px solid var(--border);
      position: relative;
    }

    .task-item:last-child { border-bottom: none; }
    .task-item:hover { background: #F9F9FB; }

    .task-item.hidden { display: none; }

    /* Checkbox */
    .checkbox {
      width: 24px; height: 24px;
      border-radius: 50%;
      border: 2px solid #C7C7CC;
      flex-shrink: 0; margin-top: 1px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
      background: transparent;
    }

    .checkbox:hover { border-color: var(--accent); }

    .task-item.done .checkbox {
      background: var(--accent-fill);
      border-color: var(--accent-fill);
      box-shadow: 0 0 0 2px rgba(52, 199, 89, 0.15);
    }

    .task-item.done .checkbox::after {
      content: '';
      width: 8px; height: 5px;
      border-left: 2px solid white;
      border-bottom: 2px solid white;
      transform: rotate(-45deg);
      position: relative; top: -1px;
    }

    .checkbox-inner {
      width: 10px; height: 6px;
      border-left: 2px solid transparent;
      border-bottom: 2px solid transparent;
      transform: rotate(-45deg) scale(0);
      transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative; top: -2px;
    }

    .task-item:not(.done) .checkbox:hover .checkbox-inner {
      border-color: var(--accent);
      transform: rotate(-45deg) scale(1);
    }

    .task-body { flex: 1; min-width: 0; }

    .task-text {
      font-size: 16px; line-height: 1.5;
      color: var(--text-primary);
      transition: color 0.3s;
      word-break: break-word;
    }

    .task-time {
      font-size: 11px; color: var(--text-secondary);
      margin-top: 3px; opacity: 0; transition: opacity 0.2s;
    }

    .task-item:hover .task-time { opacity: 1; }
    .task-item.done .task-text { color: var(--text-done); }
    .task-item.done .task-time { opacity: 0.5; }

    .task-delete {
      width: 28px; height: 28px;
      border-radius: 50%; background: transparent;
      border: none; display: flex; align-items: center; justify-content: center;
      cursor: pointer; opacity: 0; transition: opacity 0.15s, background 0.15s;
      flex-shrink: 0; margin-top: -2px;
    }

    .task-item:hover .task-delete { opacity: 1; }
    .task-delete:hover { background: #FFEBEB; }
    .task-delete:hover svg line { stroke: #FF3B30; }
    .task-delete svg { width: 16px; height: 16px; }

    /* Empty state */
    .empty-state {
      text-align: center; padding: 48px 20px;
      color: var(--text-secondary);
    }
    .empty-state .icon { font-size: 48px; margin-bottom: 16px; opacity: 0.3; }
    .empty-state p { font-size: 15px; line-height: 1.6; }

    /* Highlight for search */
    mark {
      background: #FFF3A4;
      color: inherit;
      border-radius: 2px;
      padding: 0 2px;
    }

    /* Sidebar News */


    /* Sidebar */
    .sidebar-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.3);
      z-index: 99;
    }

    .sidebar-overlay.show { display: block; }

    .sidebar {
      position: fixed;
      top: 0; right: 0;
      width: var(--sidebar-w);
      height: 100vh;
      background: var(--card);
      border-left: 0.5px solid var(--border);
      box-shadow: -4px 0 24px rgba(0,0,0,0.08);
      z-index: 100;
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
    }

    .sidebar.open { transform: translateX(0); }

    .sidebar-header {
      padding: 20px 16px 12px;
      border-bottom: 0.5px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .sidebar-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .sidebar-close {
      width: 28px; height: 28px;
      border-radius: 50%; border: none;
      background: transparent; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }

    .sidebar-close:hover { background: #F2F2F7; }
    .sidebar-close svg { width: 16px; height: 16px; color: var(--text-secondary); }

    .sidebar-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
      -webkit-overflow-scrolling: touch;
    }

    .sidebar-day {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      cursor: pointer;
      transition: background 0.15s;
      font-size: 14px;
    }

    .sidebar-day:hover { background: #F2F2F7; }
    .sidebar-day.active { background: var(--accent-light); }

    .sidebar-day-left {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .sidebar-day-name {
      font-weight: 500;
      color: var(--text-primary);
    }

    .sidebar-day-date {
      font-size: 11px;
      color: var(--text-secondary);
    }

    .sidebar-day.active .sidebar-day-name { color: var(--accent); }

    .sidebar-day-badge {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-secondary);
      background: #F2F2F7;
      padding: 2px 8px;
      border-radius: 10px;
      min-width: 24px;
      text-align: center;
    }

    .sidebar-day.active .sidebar-day-badge {
      background: var(--accent);
      color: white;
    }

    .sidebar-footer {
      padding: 12px 16px;
      border-top: 0.5px solid var(--border);
      font-size: 11px;
      color: var(--text-secondary);
      text-align: center;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 40px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(28, 28, 30, 0.9);
      color: white; font-size: 14px;
      padding: 12px 24px;
      border-radius: 10px;
      opacity: 0; transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      z-index: 1000; white-space: nowrap;
      display: flex; align-items: center; gap: 6px;
    }

    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .undo-btn { color: #5AC8FA; font-weight: 600; cursor: pointer; }

    /* Animations */
    @keyframes taskEnter {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes taskDone {
      0% { transform: scale(1); }
      50% { transform: scale(1.15); }
      100% { transform: scale(1); }
    }

    .task-item.entering { animation: taskEnter 0.25s ease forwards; }
    .task-item.check-anim .checkbox { animation: taskDone 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }

    /* Mobile */
    @media (max-width: 480px) {
      .main { padding: 20px 0 100px; }
      .add-task-row { border-radius: 0; border-left: none; border-right: none; }
      .task-list { border-radius: 0; border-left: none; border-right: none; }
      .header { padding: 0 16px; }
      .search-box { margin: 0 16px 20px; }
      .sidebar { width: 85vw; }
    }

    @media (min-width: 900px) {
      .main { padding: 40px 16px 120px 16px; }
    }
  </style>
</head>
<body>

<div class="layout">
  <!-- Left Sidebar - News -->
  <div class="left-sidebar" id="leftSidebar">
    <div class="left-sidebar-header">
      <span class="left-sidebar-title">📰 今日新闻</span>
      <button class="left-sidebar-refresh" onclick="loadNews()" title="刷新">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M1 4v6h6"></path>
          <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path>
        </svg>
        刷新
      </button>
    </div>
    <div class="left-sidebar-content" id="leftSidebarContent">
      <div class="news-loading" id="leftNewsLoading">加载中…</div>
      <div id="leftNewsList"></div>
    </div>
  </div>
  <button class="left-sidebar-toggle" onclick="toggleLeftSidebar()" title="展开/收起新闻栏">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <polyline points="15 18 9 12 15 6"></polyline>
    </svg>
  </button>


  <!-- Main content -->
  <div class="main" id="mainContent">
    <div class="header">
      <div>
        <h1>每日记录</h1>
      </div>
      <div class="header-actions">
        <button class="today-btn" onclick="scrollToToday()">今天</button>
        <button class="sidebar-toggle" id="sidebarToggle" onclick="toggleSidebar()" title="目录">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
          </svg>
        </button>
        <button class="share-btn" id="shareBtn" onclick="shareSession()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="18" cy="5" r="3"></circle>
            <circle cx="6" cy="12" r="3"></circle>
            <circle cx="18" cy="19" r="3"></circle>
            <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line>
            <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line>
          </svg>
          <span id="shareBtnText">分享</span>
        </button>
      </div>
    </div>

    <!-- Search -->
    <div class="search-box" id="searchBox">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
      <input type="text" id="searchInput" placeholder="搜索记录…" autocomplete="off">
      <button class="search-clear" onclick="clearSearch()">✕</button>
    </div>
    <div class="search-result-count" id="searchResultCount"></div>

    <!-- Add task -->
    <div class="add-task-row">
      <div class="add-icon"></div>
      <input id="taskInput" type="text" placeholder="记录今天做了什么…" autocomplete="off">
    </div>

    <!-- Timeline -->
    <div id="timeline"></div>

    <div class="empty-state" id="emptyState" style="display:none;">
      <div class="icon">📝</div>
      <p>还没有任何记录<br><span style="font-size:13px;opacity:0.6">在上方输入今天做的事情</span></p>
    </div>
  </div>

  <!-- Sidebar overlay -->
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title">目录</span>
      <button class="sidebar-close" onclick="closeSidebar()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>
    <div class="sidebar-list" id="sidebarList"></div></div>
    <div class="sidebar-footer" id="sidebarFooter"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function() {
  const SESSION_SHARE_URL = 'https://qclaw.qq.com/session-share?share_id=9xO8ANQtBUM4';

  let allTasks = {};
  let lastRemoved = null;
  let toastTimer = null;
  let searchQuery = '';

  // Date helpers
  function dateToKey(d) {
    const dt = new Date(d);
    return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
  }

  function isToday(d) {
    return dateToKey(d) === dateToKey(new Date());
  }

  function formatDisplayDate(d) {
    const dt = new Date(d);
    const month = dt.getMonth() + 1;
    const day = dt.getDate();
    const weekday = ['周日','周一','周二','周三','周四','周五','周六'][dt.getDay()];
    return `${month}月${day}日 ${weekday}`;
  }

  function formatFullDate(d) {
    const dt = new Date(d);
    return `${dt.getFullYear()}年${dt.getMonth()+1}月${dt.getDate()}日 ${['周日','周一','周二','周三','周四','周五','周六'][dt.getDay()]}`;
  }

  function getSortedDateKeys() {
    return Object.keys(allTasks)
      .filter(k => allTasks[k] && allTasks[k].length > 0)
      .sort()
      .reverse(); // latest first
  }

  // Storage
  function save() {
    localStorage.setItem('daily_diary_v2', JSON.stringify(allTasks));
  }

  function load() {
    try {
      const raw = localStorage.getItem('daily_diary_v2');
      if (raw) allTasks = JSON.parse(raw);
    } catch(e) { allTasks = {}; }
  }

  // Share
  window.shareSession = async function() {
    const btn = document.getElementById('shareBtn');
    const btnText = document.getElementById('shareBtnText');
    try {
      await navigator.clipboard.writeText(SESSION_SHARE_URL);
      btn.classList.add('copied');
      btnText.textContent = '已复制';
      setTimeout(() => { btn.classList.remove('copied'); btnText.textContent = '分享'; }, 2500);
    } catch(e) {
      window.open(SESSION_SHARE_URL, '_blank');
    }
  };

  // Search
  document.getElementById('searchInput').addEventListener('input', function() {
    searchQuery = this.value.trim().toLowerCase();
    const box = document.getElementById('searchBox');
    if (searchQuery) {
      box.classList.add('has-text');
    } else {
      box.classList.remove('has-text');
    }
    render();
  });

  window.clearSearch = function() {
    document.getElementById('searchInput').value = '';
    searchQuery = '';
    document.getElementById('searchBox').classList.remove('has-text');
    render();
    document.getElementById('searchInput').focus();
  };

  // Sidebar
  window.toggleSidebar = function() {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebarOverlay');
    const btn = document.getElementById('sidebarToggle');
    const isOpen = sidebar.classList.contains('open');
    if (isOpen) {
      closeSidebar();
    } else {
      sidebar.classList.add('open');
      overlay.classList.add('show');
      btn.classList.add('active');
      renderSidebar();
      loadNews();
    }
  };

  
  // Left sidebar toggle
  window.toggleLeftSidebar = function() {
    const sidebar = document.getElementById('leftSidebar');
    sidebar.classList.toggle('collapsed');
    localStorage.setItem('leftSidebarCollapsed', sidebar.classList.contains('collapsed'));
  };

  // Restore left sidebar state
  (function() {
    const collapsed = localStorage.getItem('leftSidebarCollapsed') === 'true';
    if (collapsed) {
      document.getElementById('leftSidebar').classList.add('collapsed');
    }
  })();

  // Edit task
  window.editTask = function(dateKey, taskId, el) {
    const tasks = allTasks[dateKey] || [];
    const task = tasks.find(t => t.id === taskId);
    if (!task) return;

    const originalText = task.text;
    const input = document.createElement('input');
    input.type = 'text';
    input.className = 'task-text-edit';
    input.value = originalText;

    const parent = el.parentNode;
    el.replaceWith(input);
    input.focus();
    input.select();

    const save = () => {
      const newText = input.value.trim();
      if (newText && newText !== originalText) {
        task.text = newText;
        save();
      }
      render();
    };

    input.addEventListener('blur', save);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        input.blur();
      } else if (e.key === 'Escape') {
        input.value = originalText;
        input.blur();
      }
    });
  };

  // Load news from news-data.json into left sidebar
  window.loadNews = function() {
    const list = document.getElementById('leftNewsList');
    const loading = document.getElementById('leftNewsLoading');
    const btn = document.querySelector('.left-sidebar-refresh');

    loading.style.display = '';
    loading.textContent = '加载中…';
    if (btn) btn.classList.add('spinning');
    list.innerHTML = '';

    fetch('news-data.json?t=' + Date.now())
      .then(r => r.json())
      .then(data => {
        loading.style.display = 'none';
        if (btn) btn.classList.remove('spinning');

        if (!data.items || data.items.length === 0) {
          loading.style.display = '';
          loading.textContent = '暂无新闻';
          return;
        }

        const frag = document.createDocumentFragment();
        data.items.forEach(item => {
          const a = document.createElement('a');
          a.className = 'news-card';
          a.href = item.url || '#';
          a.target = '_blank';
          a.rel = 'noopener';

          const tagClass = item.category === '经济' ? 'econ' : 'politics';
          const tagText = item.category === '经济' ? '经济' : '政治';
          const datePart = item.time ? item.time.substring(5, 10) : '';

          a.innerHTML = `
            <div class="news-card-meta">
              <span class="news-card-tag ${tagClass}">${tagText}</span>
              <span class="news-card-source">${item.source || ''}</span>
              <span class="news-card-time">${datePart}</span>
            </div>
            <div class="news-card-title">${item.title}</div>
            ${item.summary ? `<div class="news-card-summary">${item.summary}</div>` : ''}
            <div class="news-card-arrow">阅读全文 →</div>
          `;
          frag.appendChild(a);
        });
        list.appendChild(frag);
      })
      .catch(err => {
        loading.style.display = '';
        loading.textContent = '加载失败';
        if (btn) btn.classList.remove('spinning');
        console.warn('News load error:', err);
      });
  };


  window.closeSidebar = function() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebarOverlay').classList.remove('show');
    document.getElementById('sidebarToggle').classList.remove('active');
  };

  function renderSidebar() {
    const list = document.getElementById('sidebarList');
    const keys = getSortedDateKeys();
    list.innerHTML = '';

    // Reset news state
    document.getElementById('newsLoading').style.display = '';
    document.getElementById('newsList').innerHTML = '';

    keys.forEach(key => {
      const div = document.createElement('div');
      const d = new Date(key + 'T00:00:00');
      const tasks = allTasks[key] || [];
      const done = tasks.filter(t => t.done).length;
      const isTodayDate = isToday(d);

      div.className = 'sidebar-day';
      div.innerHTML = `
        <div class="sidebar-day-left">
          <span class="sidebar-day-name">${formatDisplayDate(d)}${isTodayDate ? ' <span style="color:var(--accent);font-size:11px;">(今天)</span>' : ''}</span>
          <span class="sidebar-day-date">${key}</span>
        </div>
        <span class="sidebar-day-badge">${done}/${tasks.length}</span>
      `;
      div.addEventListener('click', () => {
        scrollToDate(key);
        closeSidebar();
      });
      list.appendChild(div);
    });

    document.getElementById('sidebarFooter').textContent = `共 ${keys.length} 天记录`;
  }

  function scrollToDate(key) {
    const el = document.getElementById('section-' + key);
    if (el) {
      el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
  }

  window.scrollToToday = function() {
    const todayKey = dateToKey(new Date());
    scrollToDate(todayKey);
  };

  // Render timeline
  function render() {
    const timeline = document.getElementById('timeline');
    const keys = getSortedDateKeys();

    if (keys.length === 0) {
      timeline.innerHTML = '';
      document.getElementById('emptyState').style.display = '';
      return;
    }

    document.getElementById('emptyState').style.display = 'none';

    let html = '';
    let totalVisible = 0;

    keys.forEach((key, sectionIdx) => {
      const d = new Date(key + 'T00:00:00');
      const tasks = allTasks[key] || [];
      const done = tasks.filter(t => t.done).length;
      const pct = tasks.length > 0 ? Math.round((done / tasks.length) * 100) : 0;
      const isTodayDate = isToday(d);

      // Filter tasks by search
      const filteredTasks = searchQuery
        ? tasks.filter(t => t.text.toLowerCase().includes(searchQuery))
        : tasks;

      totalVisible += filteredTasks.length;

      const highlight = (text) => {
        if (!searchQuery) return text;
        const idx = text.toLowerCase().indexOf(searchQuery);
        if (idx === -1) return text;
        return text.substring(0, idx) +
               '<mark>' + text.substring(idx, idx + searchQuery.length) + '</mark>' +
               text.substring(idx + searchQuery.length);
      };

      html += `<div class="date-section" id="section-${key}">`;
      html += `<div class="date-sticky">
        <div class="date-header">
          <div class="date-title">
            ${formatDisplayDate(d)}${isTodayDate ? '<span class="today-tag">今天</span>' : ''}
          </div>
          <div class="date-progress">
            <span class="date-progress-text">${done}/${tasks.length}</span>
            <div class="date-progress-bar">
              <div class="date-progress-fill" style="width:${pct}%"></div>
            </div>
          </div>
        </div>
      </div>`;

      if (filteredTasks.length === 0) {
        html += `<div class="task-list" style="padding:32px 20px;text-align:center;color:var(--text-secondary);font-size:14px;">
          ${searchQuery ? '没有匹配的记录' : '还没有记录'}
        </div>`;
      } else {
        html += `<div class="task-list">`;
        filteredTasks.forEach((task, i) => {
          const taskDate = new Date(task.created);
          const timeStr = `${String(taskDate.getHours()).padStart(2,'0')}:${String(taskDate.getMinutes()).padStart(2,'0')}`;
          html += `
            <div class="task-item ${task.done ? 'done' : ''}" data-id="${task.id}" data-date="${key}">
              <div class="checkbox" onclick="event.stopPropagation(); toggleTask('${key}','${task.id}')">
                <div class="checkbox-inner"></div>
              </div>
              <div class="task-body">
                <div class="task-text" onclick="editTask('${key}','${task.id}', this)">${highlight(task.text)}</div>
                <div class="task-time">${timeStr}</div>
              </div>
              <button class="task-delete" onclick="event.stopPropagation(); deleteTask('${key}','${task.id}')">
                <svg viewBox="0 0 24 24" fill="none" stroke="#C7C7CC" stroke-width="2" stroke-linecap="round">
                  <line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
              </button>
            </div>`;
        });
        html += `</div>`;
      }

      html += `</div>`;
    });

    timeline.innerHTML = html;

    // Search result count
    const countEl = document.getElementById('searchResultCount');
    if (searchQuery) {
      countEl.style.display = '';
      countEl.textContent = `找到 ${totalVisible} 条匹配记录`;
    } else {
      countEl.style.display = 'none';
    }
  }

  // Task operations
  window.toggleTask = function(dateKey, id) {
    const tasks = allTasks[dateKey] || [];
    const task = tasks.find(t => t.id === id);
    if (!task) return;
    task.done = !task.done;
    task.completedAt = task.done ? new Date().toISOString() : null;
    save();

    const el = document.querySelector(`[data-id="${id}"]`);
    if (el) {
      el.classList.add('check-anim');
      setTimeout(() => el.classList.remove('check-anim'), 350);
    }
    setTimeout(() => render(), 50);
  };

  window.addTask = function(text) {
    const trimmed = text.trim();
    if (!trimmed) return;
    const key = dateToKey(new Date());
    if (!allTasks[key]) allTasks[key] = [];
    const task = {
      id: Date.now().toString(),
      text: trimmed,
      done: false,
      created: new Date().toISOString(),
      completedAt: null
    };
    allTasks[key].push(task);
    save();
    render();
    document.getElementById('taskInput').value = '';
    document.getElementById('taskInput').focus();

    // Scroll to today's section
    setTimeout(() => scrollToDate(key), 100);
  };

  window.deleteTask = function(dateKey, id) {
    const tasks = allTasks[dateKey] || [];
    const idx = tasks.findIndex(t => t.id === id);
    if (idx === -1) return;
    const [task] = tasks.splice(idx, 1);
    if (tasks.length === 0) delete allTasks[dateKey];
    save();
    render();
    showToast(`"${task.text.substring(0,15)}${task.text.length>15?'…':''}" 已删除`, true);
    lastRemoved = { task, idx, dateKey };
  };

  window.clearDayDone = function(dateKey) {
    const tasks = allTasks[dateKey] || [];
    const done = tasks.filter(t => t.done);
    if (done.length === 0) return;
    allTasks[dateKey] = tasks.filter(t => !t.done);
    if (allTasks[dateKey].length === 0) delete allTasks[dateKey];
    save();
    render();
    showToast(`已清除 ${done.length} 项已完成`);
  };

  window.clearDayAll = function(dateKey) {
    const tasks = allTasks[dateKey] || [];
    if (tasks.length === 0) return;
    if (!confirm(`确定要清空 ${dateKey} 全部 ${tasks.length} 条记录吗？`)) return;
    delete allTasks[dateKey];
    save();
    render();
    showToast(`已清空 ${dateKey} 的记录`);
  };

  function showToast(msg, withUndo) {
    const toast = document.getElementById('toast');
    toast.innerHTML = msg + (withUndo ? '<span class="undo-btn" onclick="undoDelete()"> 撤销</span>' : '');
    toast.classList.add('show');
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 3000);
  }

  window.undoDelete = function() {
    if (!lastRemoved) return;
    const { task, idx, dateKey } = lastRemoved;
    if (!allTasks[dateKey]) allTasks[dateKey] = [];
    allTasks[dateKey].splice(idx, 0, task);
    lastRemoved = null;
    save();
    render();
    document.getElementById('toast').classList.remove('show');
  };

  // Keyboard
  document.getElementById('taskInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') window.addTask(e.target.value);
  });

  // PWA
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js').catch(err => console.warn('SW:', err));
    });
  }

  // Init
  load();
  render();
  loadNews(); // Load news into left sidebar
})();
</script>
</body>
</html>
